name: Preview Request

on:
  issue_comment:
    types: [created]

permissions:
  actions: write
  contents: read
  issues: write

jobs:
  request:
    if: startsWith(github.event.comment.body, '/preview')
    runs-on: ubuntu-latest
    steps:
      - name: Parse request and dispatch publish
        env:
          GH_TOKEN: ${{ github.token }}
          # keep the untrusted comment body out of shell interpolation
          BODY: ${{ github.event.comment.body }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          SHA=$(printf '%s' "$BODY" | head -1 | grep -oE '^/preview[[:space:]]+[0-9a-fA-F]{7,40}' | grep -oE '[0-9a-fA-F]{7,40}$' || true)

          if [ -z "$SHA" ]; then
            gh issue comment "$ISSUE" --repo "$REPO" --body "Usage: \`/preview <commit sha>\` — a 7-40 char sha from [solidjs/solid](https://github.com/solidjs/solid/commits/next)."
            exit 0
          fi

          SUCCESS=$(gh api "repos/$REPO/contents/db.json" --jq .content 2>/dev/null | base64 --decode 2>/dev/null || printf '{"builds":[]}')
          if printf '%s' "$SUCCESS" | jq -e --arg sha "$SHA" '.builds[]? | select(.sha == $sha)' >/dev/null; then
            gh issue comment "$ISSUE" --repo "$REPO" --body "Preview packages for \`$SHA\` have already been published."
            exit 0
          fi

          gh workflow run sync-preview-mirror.yml --repo "$REPO" -f commit="$SHA"

          SHORT=$(printf '%s' "$SHA" | cut -c1-7 | tr 'A-F' 'a-f')
          {
            echo "🚀 Building preview packages for \`$SHA\`… (~3 min, [progress](https://github.com/$REPO/actions))"
            echo
            echo "Once the **Preview Release** run is green:"
            echo
            echo '```'
            echo "npm i https://pkg.pr.new/$REPO/solid-js@$SHORT"
            echo "npm i https://pkg.pr.new/$REPO/@solidjs/web@$SHORT"
            echo '```'
            echo
            echo "Same pattern for \`@solidjs/signals\`, \`@solidjs/h\`, \`@solidjs/html\`, \`@solidjs/element\`, \`@solidjs/universal\`, \`babel-preset-solid\`."
            echo
            echo "If the run fails, check that the sha exists on [solidjs/solid](https://github.com/solidjs/solid)."
          } > /tmp/preview-comment.md
          gh issue comment "$ISSUE" --repo "$REPO" --body-file /tmp/preview-comment.md
