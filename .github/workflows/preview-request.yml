name: Preview Request

on:
  issue_comment:
    types: [created]

permissions: {}

jobs:
  request:
    if: >
      github.event.issue.number == 2 &&
      (startsWith(github.event.comment.body, '/preview') ||
       startsWith(github.event.comment.body, '/refresh') ||
       startsWith(github.event.comment.body, '/latest'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    outputs:
      sha: ${{ steps.request.outputs.sha }}
    steps:
      - name: Parse and validate request
        id: request
        env:
          GH_TOKEN: ${{ github.token }}
          # Keep the untrusted comment body out of shell interpolation.
          BODY: ${{ github.event.comment.body }}
          ISSUE: ${{ github.event.issue.number }}
          REQUESTED_BY: ${{ github.event.comment.user.login }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          FIRST_LINE=$(printf '%s' "$BODY" | head -1)
          COMMAND=$(printf '%s' "$FIRST_LINE" | awk '{print $1}')
          MODE=""

          case "$COMMAND" in
            /preview)
              MODE="preview"
              REQUESTED=$(printf '%s' "$FIRST_LINE" | grep -oE '^/preview[[:space:]]+[0-9a-fA-F]{7,40}$' | grep -oE '[0-9a-fA-F]{7,40}$' || true)
              if [ -z "$REQUESTED" ]; then
                gh issue comment "$ISSUE" --repo "$REPO" --body "@$REQUESTED_BY, usage: \`/preview <commit sha>\` — a 7-40 character SHA from solidjs/solid's \`next\` branch."
                exit 0
              fi
              SHA=$(gh api "repos/solidjs/solid/commits/$REQUESTED" --jq .sha 2>/dev/null || true)
              if [ -z "$SHA" ]; then
                gh issue comment "$ISSUE" --repo "$REPO" --body "@$REQUESTED_BY, commit \`$REQUESTED\` was not found in solidjs/solid."
                exit 0
              fi
              ;;
            /refresh|/latest)
              MODE="refresh"
              if [ "$FIRST_LINE" != "$COMMAND" ]; then
                gh issue comment "$ISSUE" --repo "$REPO" --body "@$REQUESTED_BY, usage: \`$COMMAND\`"
                exit 0
              fi
              SHA=$(git ls-remote https://github.com/solidjs/solid.git refs/heads/next | cut -f1)
              ;;
            *)
              exit 0
              ;;
          esac

          STATUS=$(gh api "repos/solidjs/solid/compare/$SHA...next" --jq .status 2>/dev/null || true)
          # The compare is BASE_SHA...next, so "ahead" means next contains
          # commits after the requested SHA and the SHA is in its history.
          if [ "$STATUS" != ahead ] && [ "$STATUS" != identical ]; then
            gh issue comment "$ISSUE" --repo "$REPO" --body "@$REQUESTED_BY, commit \`$SHA\` is not reachable from solidjs/solid's \`next\` branch."
            exit 0
          fi

          SUCCESS=$(gh api "repos/$REPO/contents/db.json" --jq .content 2>/dev/null | base64 --decode 2>/dev/null || printf '{"builds":[]}')
          if printf '%s' "$SUCCESS" | jq -e --arg sha "$SHA" '.builds[]? | select(.sha == $sha)' >/dev/null; then
            gh issue comment "$ISSUE" --repo "$REPO" --body "@$REQUESTED_BY, preview packages for \`$SHA\` are already published."
            exit 0
          fi

          if [ "$MODE" = refresh ]; then
            FAILURES=$(gh api "repos/$REPO/contents/failure.json" --jq .content 2>/dev/null | base64 --decode 2>/dev/null || printf '{"failures":[]}')
            if printf '%s' "$FAILURES" | jq -e --arg sha "$SHA" '.failures[]? | select(.sha == $sha)' >/dev/null; then
              gh issue comment "$ISSUE" --repo "$REPO" --body "@$REQUESTED_BY, the latest \`next\` commit \`$SHA\` previously failed. Use \`/preview $SHA\` to retry it."
              exit 0
            fi
          fi

          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          SHORT=${SHA:0:7}
          gh issue comment "$ISSUE" --repo "$REPO" \
            --body "@$REQUESTED_BY, preview \`$SHORT\` has started. [Follow the run](https://github.com/$REPO/actions/runs/$GITHUB_RUN_ID)."

  publish:
    needs: request
    if: needs.request.outputs.sha != ''
    uses: ./.github/workflows/preview-release.yml
    with:
      commit: ${{ needs.request.outputs.sha }}
      trigger: preview-request
      request_issue: ${{ github.event.issue.number }}
      requested_by: ${{ github.event.comment.user.login }}
    permissions:
      contents: write
      issues: write
