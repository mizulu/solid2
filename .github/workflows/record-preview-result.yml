name: Record Preview Result

on:
  workflow_run:
    workflows: [Preview Release (pkg.pr.new)]
    types: [completed]

permissions:
  contents: write
  issues: write

concurrency:
  group: preview-ledger
  cancel-in-progress: false

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      # This checkout is of the trusted default branch only. This job never
      # checks out or executes the upstream source.
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Download result metadata
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          ARTIFACT_ID=$(gh api "repos/$REPO/actions/runs/$RUN_ID/artifacts" --jq '.artifacts[] | select(.name == "preview-result") | .id')
          test -n "$ARTIFACT_ID"
          gh api "repos/$REPO/actions/artifacts/$ARTIFACT_ID/zip" > /tmp/preview-result.zip
          unzip -p /tmp/preview-result.zip preview-result.json > /tmp/preview-result.json
          jq -e '.sha | test("^[0-9a-f]{40}$")' /tmp/preview-result.json >/dev/null

      - name: Record result
        env:
          RESULT: /tmp/preview-result.json
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          set -euo pipefail
          UPSTREAM_SHA=$(jq -r .sha "$RESULT")
          TRIGGER=$(jq -r .trigger "$RESULT")
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          test -f db.json || printf '{"builds":[]}\n' > db.json
          test -f failure.json || printf '{"failures":[]}\n' > failure.json

          if [ "$CONCLUSION" = success ]; then
            jq --arg sha "$UPSTREAM_SHA" --arg completedAt "$NOW" --arg trigger "$TRIGGER" --arg runUrl "$RUN_URL" \
              '.builds = ((.builds // []) | map(select(.sha != $sha)) + [{sha: $sha, completedAt: $completedAt, trigger: $trigger, runUrl: $runUrl}])' \
              db.json > db.json.tmp && mv db.json.tmp db.json
          else
            jq --arg sha "$UPSTREAM_SHA" --arg completedAt "$NOW" --arg trigger "$TRIGGER" --arg conclusion "$CONCLUSION" --arg runUrl "$RUN_URL" \
              '.failures = ((.failures // []) | map(select(.sha != $sha)) + [{sha: $sha, completedAt: $completedAt, trigger: $trigger, conclusion: $conclusion, runUrl: $runUrl}])' \
              failure.json > failure.json.tmp && mv failure.json.tmp failure.json
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add db.json failure.json
          if ! git diff --cached --quiet; then
            git commit -m "ci: record preview result for ${UPSTREAM_SHA}"
            git push origin "HEAD:${{ github.event.repository.default_branch }}"
          fi

      - name: Announce successful preview in issue #1
        if: github.event.workflow_run.conclusion == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RESULT: /tmp/preview-result.json
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          set -euo pipefail
          SHA=$(jq -r .sha "$RESULT")
          SHORT=${SHA:0:7}
          {
            echo "✅ Preview packages built for \`$SHA\`. ([run]($RUN_URL))"
            echo
            echo '```sh'
            echo "npm i https://pkg.pr.new/$REPO/solid-js@$SHORT"
            echo "npm i https://pkg.pr.new/$REPO/@solidjs/web@$SHORT"
            echo '```'
          } > /tmp/preview-success-comment.md
          gh issue comment 1 --repo "$REPO" --body-file /tmp/preview-success-comment.md
