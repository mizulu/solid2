name: Check Upstream Preview

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      commit:
        description: "Upstream commit SHA to publish. Leave empty for the latest next."
        required: false
        default: ""

permissions: {}

concurrency:
  group: preview-sync-${{ inputs.commit || 'next' }}
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      sha: ${{ steps.target.outputs.sha }}
      ledger: ${{ steps.target.outputs.ledger }}
    steps:
      - uses: actions/checkout@v5

      - name: Find an unattempted upstream commit
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET: ${{ inputs.commit }}
        run: |
          set -euo pipefail
          NEXT_SHA=$(git ls-remote https://github.com/solidjs/solid.git refs/heads/next | cut -f1)
          if [ -n "$TARGET" ]; then
            if ! [[ "$TARGET" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
              echo "commit must be a 7-40 character SHA" >&2
              exit 1
            fi
            UPSTREAM_SHA=$(gh api "repos/solidjs/solid/commits/$TARGET" --jq .sha)
            STATUS=$(gh api "repos/solidjs/solid/compare/$UPSTREAM_SHA...next" --jq .status)
            # The compare is BASE_SHA...next, so "ahead" means next contains
            # commits after the requested SHA and the SHA is in its history.
            if [ "$STATUS" != ahead ] && [ "$STATUS" != identical ]; then
              echo "$UPSTREAM_SHA is not reachable from solidjs/solid next" >&2
              exit 1
            fi
          else
            UPSTREAM_SHA=$NEXT_SHA
          fi

          if [ "$UPSTREAM_SHA" = "$NEXT_SHA" ]; then
            LEDGER=success
          else
            LEDGER=preview
          fi

          if jq -e --arg sha "$UPSTREAM_SHA" '.builds[]? | select(.sha == $sha)' db.json db-preview.json >/dev/null; then
            echo "$UPSTREAM_SHA has already been published"
            exit 0
          fi

          if [ -z "$TARGET" ] && jq -e --arg sha "$UPSTREAM_SHA" '.failures[]? | select(.sha == $sha)' failure.json >/dev/null; then
            echo "$UPSTREAM_SHA previously failed; waiting for an explicit /preview retry"
            exit 0
          fi

          echo "sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"
          echo "ledger=$LEDGER" >> "$GITHUB_OUTPUT"


  publish:
    needs: dispatch
    if: needs.dispatch.outputs.sha != ''
    uses: ./.github/workflows/preview-release.yml
    with:
      commit: ${{ needs.dispatch.outputs.sha }}
      trigger: ${{ inputs.commit && 'manual' || 'schedule' }}
      ledger: ${{ needs.dispatch.outputs.ledger }}
    permissions:
      contents: write
      issues: write
